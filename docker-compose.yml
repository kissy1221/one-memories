services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: one_memory
      POSTGRES_PASSWORD: password
      POSTGRES_DB: one_memory_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U one_memory"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: bundle exec rails server -b 0.0.0.0
    volumes:
      - ./backend:/app
      - bundle_cache:/usr/local/bundle
    ports:
      - "3001:3000"
    environment:
      RAILS_ENV: development
      DB_HOST: db
      DB_USER: one_memory
      DB_PASSWORD: password
      CORS_ORIGINS: http://localhost:5174
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "5174:5173"
    environment:
      VITE_API_URL: http://localhost:3001

volumes:
  postgres_data:
  bundle_cache:
  node_modules:
